name: Build and deploy (Cloudflare Workers)

# Pull requests upload a preview version, which is never promoted to production.
# Pushes to main deploy the live worker.
#
# Both paths build on Linux. Do not deploy from a Windows workstation: the
# resulting worker 500s on every route (see scripts/guard-windows-deploy.mjs).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Validate required secrets
        run: |
          MISSING=""
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            MISSING="$MISSING CLOUDFLARE_API_TOKEN"
          fi
          if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            MISSING="$MISSING CLOUDFLARE_ACCOUNT_ID"
          fi
          if [ -n "$MISSING" ]; then
            echo "❌ Missing secrets:$MISSING"
            exit 1
          fi
          echo "✅ Secrets present."

      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # opennextjs-cloudflare build, not next build: this is what compiles
      # open-next.config.ts and emits .open-next/worker.js, which wrangler.toml
      # points at. A plain next build only produces .next/ and the deploy fails.
      # NEXT_PUBLIC_API_URL comes from the committed .env.production.
      - name: Build for Cloudflare Workers
        run: npm run pages:build

      # CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID must both belong to the
      # account that owns the worker. If they disagree this fails with
      # "Authentication error [code: 10000]", which names neither the mismatch
      # nor the missing worker. See docs/DEPLOYMENT.md.
      - name: Upload preview version
        if: github.event_name != 'push'
        run: npx wrangler versions upload
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to production
        if: github.event_name == 'push'
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
