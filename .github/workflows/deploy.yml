name: Preview build (Cloudflare Workers)

# Production deploys run from Cloudflare Workers Builds on push to main.
# This workflow only uploads preview versions, which are never promoted to
# production, so the two paths cannot race for the live worker.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  preview:
    runs-on: ubuntu-latest

    steps:
      - name: Validate required secrets
        run: |
          MISSING=""
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            MISSING="$MISSING CLOUDFLARE_API_TOKEN"
          fi
          if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            MISSING="$MISSING CLOUDFLARE_ACCOUNT_ID"
          fi
          if [ -n "$MISSING" ]; then
            echo "❌ Missing secrets:$MISSING"
            exit 1
          fi
          echo "✅ Secrets present."

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # opennextjs-cloudflare build, not next build: this is what compiles
      # open-next.config.ts and emits .open-next/worker.js, which wrangler.toml
      # points at. A plain next build only produces .next/ and the deploy fails.
      # NEXT_PUBLIC_API_URL comes from the committed .env.production.
      - name: Build for Cloudflare Workers
        run: npm run pages:build

      - name: Upload preview version
        run: npx wrangler versions upload
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
